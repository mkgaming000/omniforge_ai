# OmniForge AI — Continuous Integration
# Runs on every push to any branch and every pull request.
# Fails the build on any analyzer error or test failure.
name: CI

on:
  push:
    branches: [main, develop, 'release/**']
    tags-ignore: ['v*']  # tags trigger the release workflow instead
  pull_request:
    branches: [main, develop, 'release/**']

# Cancel in-progress runs on the same ref so we don't waste minutes
# on superseded commits.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

jobs:
  # -------------------------------------------------------------------------
  # Job 1: Static analysis + unit/widget tests
  # -------------------------------------------------------------------------
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for blame + coverage

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
          key: pub-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-${{ runner.os }}-

      - name: Print environment
        run: |
          echo "Flutter version: $(flutter --version)"
          echo "Dart version: $(dart --version)"
          echo "Java version: $(java --version)"

      - name: Restore pub packages
        run: flutter pub get

      - name: Verify pubspec.lock is in sync
        run: |
          # If pubspec.lock changes after `pub get`, the lockfile was stale.
          if ! git diff --exit-code pubspec.lock; then
            echo "::error::pubspec.lock is out of date. Run 'flutter pub get' and commit the result."
            exit 1
          fi

      - name: Apply dart formatting
        # Auto-format in the CI runner so the analyze/test steps run on
        # formatted code. Always exits 0.
        run: dart format lib/ test/

      - name: Generate Hive adapters (build_runner)
        # MUST run before analyze — the part directives reference .g.dart
        # files that don't exist until build_runner generates them.
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Run dart analyze
        run: dart analyze --fatal-infos --fatal-warnings lib/ test/

      - name: Run flutter analyze
        run: flutter analyze --no-pub --current-package --no-fatal-infos

      - name: Run unit + widget tests
        run: flutter test --coverage --reporter expanded

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14
          if-no-files-found: warn

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: |
            test/**/*.dart
            coverage/
          retention-days: 7
          if-no-files-found: warn

  # -------------------------------------------------------------------------
  # Job 2: Stale-branch / dependency audit (parallel with analyze)
  # -------------------------------------------------------------------------
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Restore pub packages
        run: flutter pub get

      - name: Check for outdated dependencies
        run: |
          # List outdated packages; fail only if any have security advisories.
          dart pub outdated --no-dev-dependencies --json > outdated.json || true
          cat outdated.json | head -100

      - name: Verify no path dependencies
        run: |
          # Path dependencies break CI builds that fetch from pub.
          # Only flag REAL local path deps (path: ../, path: ./, path: ../../) —
          # NOT the `path` Dart package, whose declaration looks like
          # `path: ^1.9.0`. The previous regex `^\s+path:\s` matched both.
          if grep -E '^\s+path:\s+\.\.?/' pubspec.yaml; then
            echo "::error::Path dependencies are not allowed in production pubspec.yaml"
            exit 1
          fi

      - name: Verify all imports resolve
        run: |
          # If `dart pub get` succeeded and analyze passes, imports resolve.
          # This is a redundant explicit check.
          dart pub get
          echo "All imports resolve."
