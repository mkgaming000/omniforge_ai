# OmniForge AI — Release AAB build (Android App Bundle for Play Store)
# Triggers manually, on release tags, and via workflow_call from release.yml.
name: Build AAB

on:
  workflow_dispatch:
    inputs:
      flavor:
        description: 'Build flavor (production | staging)'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  workflow_call:
    inputs:
      flavor:
        required: true
        type: string
        default: 'production'
      version_tag:
        required: false
        type: string
        default: ''

permissions:
  contents: read

env:
  FLUTTER_VERSION: '3.24.5'
  JAVA_VERSION: '17'

jobs:
  build-aab:
    name: Build Release AAB (${{ inputs.flavor }})
    runs-on: ubuntu-latest
    timeout-minutes: 40

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Set up Flutter ${{ env.FLUTTER_VERSION }}
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-aab-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-aab-${{ runner.os }}-

      - name: Cache Pub packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.pub-cache
            ${{ github.workspace }}/.dart_tool
          key: pub-aab-${{ runner.os }}-${{ hashFiles('pubspec.lock') }}
          restore-keys: |
            pub-aab-${{ runner.os }}-

      - name: Restore pub packages
        run: flutter pub get

      - name: Generate Hive adapters
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Decode signing keystore
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "::warning::SIGNING_KEYSTORE_BASE64 secret not set — building debug-signed AAB."
            mkdir -p android/app/keystore
            exit 0
          fi
          mkdir -p android/app/keystore
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > android/app/keystore/release.keystore
          echo "Keystore decoded: $(stat -c%s android/app/keystore/release.keystore) bytes"

      - name: Create key.properties
        env:
          KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
        run: |
          if [ -z "$KEYSTORE_PASSWORD" ]; then
            echo "::warning::Signing secrets not set — using debug signing."
            exit 0
          fi
          cat > android/key.properties <<EOF
          storePassword=$KEYSTORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=keystore/release.keystore
          EOF

      - name: Build release AAB
        run: flutter build appbundle --release --flavor ${{ inputs.flavor }} --no-tree-shake-icons

      - name: List built AAB
        run: |
          ls -lh build/app/outputs/bundle/${{ inputs.flavor }}Release/ || \
          ls -lh build/app/outputs/bundle/release/ || true

      - name: Generate SHA-256 checksum
        run: |
          AAB_PATH=$(find build/app/outputs/bundle -name "*.aab" | head -1)
          if [ -n "$AAB_PATH" ]; then
            sha256sum "$AAB_PATH" > checksums-aab-sha256.txt
            cat checksums-aab-sha256.txt
          fi

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: aab-${{ inputs.flavor }}
          path: build/app/outputs/bundle/**/*.aab
          retention-days: 90  # Play Store uploads need longer retention
          compression-level: 0

      - name: Upload checksums
        uses: actions/upload-artifact@v4
        with:
          name: aab-checksums-${{ inputs.flavor }}
          path: checksums-aab-sha256.txt
          retention-days: 90
          if-no-files-found: warn

      - name: Build mapping file (ProGuard/R8)
        run: |
          MAPPING_PATH="build/app/outputs/mapping/${{ inputs.flavor }}Release/mapping.txt"
          if [ -f "$MAPPING_PATH" ]; then
            echo "mapping.txt found: $(stat -c%s $MAPPING_PATH) bytes"
          else
            echo "::warning::mapping.txt not found — crashlytics de-obfuscation will not work"
          fi

      - name: Upload mapping file (for Crashlytics)
        uses: actions/upload-artifact@v4
        with:
          name: mapping-${{ inputs.flavor }}
          path: build/app/outputs/mapping/**/mapping.txt
          retention-days: 90
          if-no-files-found: warn

