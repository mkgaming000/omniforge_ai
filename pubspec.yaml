name: omniforge_ai
description: "OmniForge AI - The most advanced AI Super App for Android."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management & DI
  flutter_bloc: ^8.1.6
  bloc: ^8.1.4
  hydrated_bloc: ^9.1.5
  get_it: ^7.7.0

  # Networking
  dio: ^5.5.0+1
  web_socket_channel: ^3.0.0
  connectivity_plus: ^6.0.3
  dio_smart_retry: ^6.0.0

  # Local Storage & DB
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  # NOTE: upgraded from ^9.2.2 to ^10.0.0-beta.1 to resolve the `js` package
  # version conflict with speech_to_text. speech_to_text >=6.6.1 depends on
  # js ^0.7.1, while flutter_secure_storage 9.x pulls
  # flutter_secure_storage_web 1.x which depends on js ^0.6.3 — the two
  # ranges (0.7.x vs 0.6.x) are incompatible. flutter_secure_storage 10.x
  # pulls flutter_secure_storage_web 2.x which depends on js ^0.7.x,
  # aligning both packages on the same `js` major. The public API
  # (read/write/delete/readAll/containsKey) is unchanged in 10.x — the
  # 10.x release only switched the Android backend to
  # EncryptedSharedPreferences and the Web backend to js 0.7.x.
  flutter_secure_storage: ^10.0.0-beta.1
  path_provider: ^2.1.3

  # UI / UX
  cupertino_icons: ^1.0.8
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0
  flutter_markdown: ^0.7.3
  markdown: ^7.2.2

  # Media
  image_picker: ^1.1.2
  photo_view: ^0.15.0
  speech_to_text: ^6.6.2
  # NOTE: pubspec.lock had already resolved flutter_tts to 4.2.5, which
  # violates a ^3.8.5 constraint (caret pins the major version, so 4.x is
  # out of range). The committed lock and the declared constraint were out
  # of sync. The app only calls FlutterTts(), setLanguage(), and speak(),
  # which are unchanged across 3.x -> 4.x, so the constraint is raised to
  # match the version actually locked/tested rather than forcing a
  # downgrade and a full re-resolution of the lockfile.
  flutter_tts: ^4.2.5

  # Security & Crypto
  encrypt: ^5.0.3
  local_auth: ^2.2.0
  pointycastle: ^3.9.1
  flutter_dotenv: ^5.2.1

  # Utilities
  uuid: ^4.4.0
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  dartz: ^0.10.1
  path: ^1.9.0
  share_plus: ^9.0.0
  flutter_local_notifications: ^17.2.2

  # Logging & Analytics
  logger: ^2.4.0
  sentry_flutter: ^8.9.0
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3

  # Routing
  go_router: ^14.2.7

  # Charts
  fl_chart: ^0.69.0

  # ML Kit on-device OCR
  google_mlkit_text_recognition: ^0.13.0

  # Document conversion (csv ↔ json)
  csv: ^6.0.0

# share_plus 9.x depends on web ^0.5.0, while firebase_core_web depends on
# web ^1.0.0. The `web` package is a Dart JS interop library used ONLY on the
# web platform — not at runtime on Android. Overriding to ^1.0.0 resolves the
# pub version conflict without affecting Android builds. (share_plus 12.x
# would also resolve it but requires Flutter 3.27+ / AGP 8.12, incompatible
# with Flutter 3.24.5 / AGP 8.6.0.)
dependency_overrides:
  web: ^1.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1
  mockito: ^5.4.4
  bloc_test: ^9.1.7
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
    - family: JetBrainsMono
      fonts:
        - asset: assets/fonts/JetBrainsMono-Regular.ttf
        - asset: assets/fonts/JetBrainsMono-Bold.ttf
          weight: 700
